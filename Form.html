<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="แบบฟอร์มตอบรับข้อมูลสำหรับผู้ใช้บริการ">
    <title>แบบฟอร์มการติดต่อ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { line-height: 1.6; }
      a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
        outline: 3px solid #f59e0b;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <main class="container py-5">
      <a href="index.html" class="btn btn-sm btn-outline-secondary mb-4">กลับหน้าหลัก</a>
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <form class="needs-validation bg-white border rounded-3 p-4" novalidate aria-label="แบบฟอร์มส่งข้อมูล">
            <h1 class="h3 fw-bold mb-3">แบบฟอร์มสำหรับส่งข้อมูล</h1>
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">ชื่อ-นามสกุล</label>
                <input id="firstName" name="name" class="form-control" autocomplete="name" required>
                <div class="invalid-feedback">กรุณากรอกชื่อ-นามสกุล</div>
              </div>
              <div class="col-md-6">
                <label for="Address" class="form-label">ที่อยู่</label>
                <input id="Address" name="address" class="form-control" autocomplete="street-address" required>
                <div class="invalid-feedback">กรุณากรอกที่อยู่</div>
              </div>
              <div class="col-md-6">
                <label for="Telephone" class="form-label">เบอร์โทรศัพท์</label>
                <input id="Telephone" name="telephone" type="tel" class="form-control" autocomplete="tel" required>
                <div class="invalid-feedback">กรุณากรอกเบอร์โทรศัพท์</div>
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">อีเมล</label>
                <input id="email" name="email" type="email" class="form-control" autocomplete="email" required>
                <div class="invalid-feedback">กรุณากรอกอีเมลให้ถูกต้อง</div>
              </div>
              <div class="col-12">
                <label for="topic" class="form-label">หัวข้อ</label>
                <select id="topic" name="topic" class="form-select" required>
                  <option value="">เลือกหัวข้อ</option>
                  <option>เว็บไซต์</option>
                  <option>การฝึกอบรม</option>
                </select>
                <div class="invalid-feedback">กรุณาเลือกหัวข้อ</div>
              </div>
              <div class="col-12">
                <label for="message" class="form-label">ข้อความ</label>
                <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
                <div class="invalid-feedback">กรุณากรอกข้อความ</div>
              </div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">ส่งข้อมูล</button>
          </form>
        </div>
      </div>
    </main>

    <script>
      const form = document.querySelector('.needs-validation');
      form.addEventListener('submit', (event) => {
        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      });
    </script>
  </body>
</html>
